<svg width="24" height="24" name="half-circle"
    viewBox="0 0 72 36"
    xmlns="http://www.w3.org/2000/svg"
    focusable="false"
    >
    <style>
        .heavy {
            font: 36px sans-serif;
        }
        .slim { stroke-width: .5; }
        .dash { stroke: #bb5; stroke-dasharray: 2, 3; }
    </style>
    <g class="icon" stroke-width="3" stroke="var(--svg-stroke)" fill="none"
        stroke-linecap="round" stroke-miterlimit="0.5"
        transform="translate(0 0) rotate(0) translate(0 0)"
    >
        <path class="slim" d="
            M 10 10
            C 10 40 60 40 60 10
            " />
        <path class="slim dash" d="m10 10 l 0 30"/>
        <path class="slim dash" d="m60 10 l 0 30"/>
        <path d="m10 10 z" stroke="red"/>
        <path d="m10 40 z" stroke="green"/>
        <path d="m60 10 z" stroke="red"/>
        <path d="m60 40 z" stroke="green"/>
    </g>
</svg>
