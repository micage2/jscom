<svg xmlns="http://www.w3.org/2000/svg" 
    height="256px" width="256px"
    viewBox="0 0 256 256"
    fill="#5643"
    stroke="#777"
>
<g name="cities">
    <g name="Rome" transform="matrix(1,0,0,1, 30, 50)">
        <circle cx="0" cy="0" r="30" />
        <rect x="0" y="130" width="130" height="10" />
    </g>
    <g name="Paris" transform="matrix(1,0,0,1, 10, 70)">
        <circle cx="0" cy="0" r="10" />
        <circle cx="40" cy="40" r="10" />
        <circle cx="20" cy="70" r="10" />
        <circle cx="120" cy="50" r="40" />
        <g name="Notredame" transform="matrix(1,0,0,1, 170, 80)">
            <circle cx="50" cy="-30" r="20" />
            <circle cx="20" cy="-10" r="20" />
            <rect x="20" y="10" width="10" height="50" />
        </g>
    </g>
</g>
</svg>